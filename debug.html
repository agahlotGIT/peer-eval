<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Supabase Debug Test</h1>
    <p>Use this page to test your Supabase connection and data fetching.</p>

    <div class="test-section">
        <h3>Test 1: Basic Connection</h3>
        <button onclick="testConnection()">Test Supabase Connection</button>
        <div id="connection-result"></div>
    </div>

    <div class="test-section">
        <h3>Test 2: Student Table</h3>
        <button onclick="testStudentTable()">Fetch Student Data</button>
        <div id="student-result"></div>
    </div>

    <div class="test-section">
        <h3>Test 3: Professor Table</h3>
        <button onclick="testProfessorTable()">Fetch Professor Data</button>
        <div id="professor-result"></div>
    </div>

    <div class="test-section">
        <h3>Test 4: Peer Evaluation Table</h3>
        <button onclick="testEvaluationTable()">Fetch Evaluation Data</button>
        <div id="evaluation-result"></div>
    </div>

    <div class="test-section">
        <h3>Test 6: Check Professor Auth</h3>
        <button onclick="checkProfessorAuth()">Check Professor Login</button>
        <div id="professor-auth-result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabaseClient.js"></script>

    <script>
        function showResult(elementId, result, isSuccess = true) {
            const element = document.getElementById(elementId);
            element.className = isSuccess ? 'success' : 'error';
            element.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        }

        async function testConnection() {
            try {
                console.log("Testing basic connection...");
                const result = await window.supabaseClient.from("student").select("count", { count: 'exact', head: true });
                console.log("Connection result:", result);
                showResult('connection-result', result, !result.error);
            } catch (error) {
                console.error("Connection test failed:", error);
                showResult('connection-result', { error: error.message }, false);
            }
        }

        async function testStudentTable() {
            try {
                console.log("Testing student table...");
                const result = await window.supabaseClient.from("student").select("*").limit(5);
                console.log("Student table result:", result);
                showResult('student-result', result, !result.error);
            } catch (error) {
                console.error("Student table test failed:", error);
                showResult('student-result', { error: error.message }, false);
            }
        }

        async function testProfessorTable() {
            try {
                console.log("Testing professor table...");
                const result = await window.supabaseClient.from("professor").select("*").limit(5);
                console.log("Professor table result:", result);
                showResult('professor-result', result, !result.error);
            } catch (error) {
                console.error("Professor table test failed:", error);
                showResult('professor-result', { error: error.message }, false);
            }
        }

        async function testEvaluationTable() {
            try {
                console.log("Testing evaluation table...");
                const result = await window.supabaseClient.from("peerevaluation").select("*").limit(5);
                console.log("Evaluation table result:", result);
                showResult('evaluation-result', result, !result.error);
            } catch (error) {
                console.error("Evaluation table test failed:", error);
                showResult('evaluation-result', { error: error.message }, false);
            }
        }

        async function listAllTables() {
            try {
                console.log("Listing all tables and columns...");
                // Note: Supabase doesn't have a direct way to list all tables via client
                // We'll test known tables from the schema
                const knownTables = [
                    'student', 'professor', 'peerevaluation', 'evaluationschedule',
                    'enrollment', 'grouptable', 'course', 'learningoutcome', 'rubricscore'
                ];

                let schemaInfo = '<h4>Database Schema:</h4><ul>';

                for (const table of knownTables) {
                    try {
                        const { data, error } = await window.supabaseClient.from(table).select('*').limit(1);
                        if (!error) {
                            const columns = Object.keys(data[0] || {});
                            schemaInfo += `<li><strong>${table}</strong>: ${columns.join(', ')}</li>`;
                        } else {
                            schemaInfo += `<li><strong>${table}</strong>: Error - ${error.message}</li>`;
                        }
                    } catch (err) {
                        schemaInfo += `<li><strong>${table}</strong>: Not accessible</li>`;
                    }
                }

                schemaInfo += '</ul>';
                showResult('schema-result', { data: schemaInfo }, true);
            } catch (error) {
                console.error("Schema listing failed:", error);
                showResult('schema-result', { error: error.message }, false);
            }
        }

        async function checkProfessorAuth() {
            try {
                console.log("Testing professor authentication...");
                // Try to sign in as professor
                const result = await window.auth.signIn('tan@smu.edu.sg', 'password');
                console.log("Professor auth result:", result);
                showResult('professor-auth-result', { 
                    data: `Role: ${result.user.role}, ID: ${result.user.id}, Email: ${result.user.email}` 
                }, true);
            } catch (error) {
                console.error("Professor auth test failed:", error);
                showResult('professor-auth-result', { error: error.message }, false);
            }
        }
    </script>
</body>
