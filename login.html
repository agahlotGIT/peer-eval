<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Peer Evaluation</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="login-page-header">
      <div class="brand">
        <img 
          class="brand__logo" 
          src="./smu_logo.png" 
          alt="Singapore Management University logo" 
        />
        <div class="brand__text">
          <div class="brand__title">SMU</div>
          <div class="brand__subtitle">Evalio System</div>
        </div>
      </div>
    </header>    <main class="login-main">
      <div class="login-container">
        <div class="login-header">
          <h1 class="login-title">Welcome to Evalio</h1>
          <p class="login-subtitle"></p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
      </div>
    </main>    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./login.js"></script>
</body>
</html>
