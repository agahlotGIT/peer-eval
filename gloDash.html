<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLO Dashboard - Evalio System</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  </head>
  <body class="shome-body">
    <header class="shome-header">
      <div class="shome-brand">
        <img src="./smu_logo.png" alt="SMU logo" class="shome-logo" />
        <div class="shome-brand-text">
          <div class="shome-brand-name">SMU</div>
          <div class="shome-brand-sub">Singapore Management University</div>
        </div>
      </div>
      <div class="shome-title">Evalio System</div>
      <button class="shome-hamburger" onclick="window.location.href='sHome.html'" aria-label="Back to home">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <main class="glo-main">
      <!-- Left: Charts -->
      <div class="glo-left">
        <h3 class="glo-chart-label">Evaluation %</h3>
        <div class="glo-chart-box">
          <canvas id="pieChart"></canvas>
        </div>
        <h3 class="glo-chart-label">Evaluation %</h3>
        <div class="glo-chart-box">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <!-- Right: GLO Dashboard -->
      <div class="glo-right">
        <h1 class="glo-page-title">GLO Dashboard</h1>
        <div class="glo-panel">
          <div class="glo-grid" id="studentGrid">
            <p class="shome-hint">Loading…</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="shome-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabaseClient.js"></script>
    <script src="./auth.js"></script>
    <script src="./gloDash.js"></script>
  </body>
</html>
